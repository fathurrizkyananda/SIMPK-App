<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mahasiswa - SIPMK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo"><h1>SIPMK</h1></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Kembali ke Beranda</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="form-card">
            <div class="form-icon" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">🎓</div>
            <h2>Login Mahasiswa</h2>
            <p>Silakan masuk menggunakan NIM Anda</p>

            <form id="form-login-mhs">
                <div class="form-group">
                    <label class="form-label">NIM</label>
                    <span class="input-icon">👤</span>
                    <input type="text" id="login_nim" placeholder="Masukkan NIM..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login_pass_mhs" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">
                    <span>🚪</span> Masuk
                </button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
