<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Nilai Dosen</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

input,
select{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-save{
    background:#16a34a;
    color:white;
}

.btn-edit{
    background:#2563eb;
    color:white;
}

.btn-delete{
    background:#dc2626;
    color:white;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Input Nilai Mahasiswa</h2>

<div class="form-grid">

<input type="text" id="nim" placeholder="NIM">

<input type="text" id="nama" placeholder="Nama Mahasiswa">

<select id="kelas">
<option value="">Pilih Kelas</option>
<option>SI-A</option>
<option>SI-B</option>
<option>SI-C</option>
</select>

<select id="matkul">
<option value="">Pilih Mata Kuliah</option>
<option>Basis Data</option>
<option>Pemrograman Web</option>
<option>Algoritma</option>
</select>

<input type="number" id="tugas" placeholder="Nilai Tugas">

<input type="number" id="uts" placeholder="Nilai UTS">

<input type="number" id="uas" placeholder="Nilai UAS">

</div>

<h3>Bobot Penilaian</h3>

<div class="form-grid">

<input type="number" id="bobotTugas" value="20">

<input type="number" id="bobotUTS" value="30">

<input type="number" id="bobotUAS" value="50">

</div>

<button class="btn-save" onclick="simpanNilai()">
Simpan Nilai
</button>

<table>

<thead>

<tr>
<th>NIM</th>
<th>Nama</th>
<th>Kelas</th>
<th>Matkul</th>
<th>Tugas</th>
<th>UTS</th>
<th>UAS</th>
<th>Nilai Akhir</th>
<th>Grade</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tbodyNilai">

</tbody>

</table>

</div>

</div>

<script src="js/input-nilai.js"></script>

</body>
</html>
