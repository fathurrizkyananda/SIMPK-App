<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Dosen - SIPMK</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo"><h1>SIPMK</h1></div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Kembali ke Beranda</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="form-card">
            <div class="form-icon" style="background: linear-gradient(135deg, #10b981, #059669);">👨‍🏫</div>
            <h2>Login Dosen</h2>
            <p>Silakan masuk menggunakan NIDN Anda</p>

            <form id="form-login-dosen">
                <div class="form-group">
                    <label class="form-label">NIDN</label>
                    <span class="input-icon">👤</span>
                    <input type="text" id="login_nidn" placeholder="Masukkan NIDN..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login_pass_dosen" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, #10b981, #059669);">
                    <span>🚪</span> Masuk
                </button>
            </form>


            <div class="form-badge">
                <span>ℹ️</span>
                <p>Akun demo Dosen: NIDN <strong>12345</strong> / Password <strong>dosen123</strong>.</p>
            </div>

            <a href="index.html" class="back-link">← Kembali ke Beranda</a>

        </div>
    </section>

    <script src="js/script.js"></script>

    <script src="js/ui.js"></script>

</body>
</html>
