<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Nilai - SIPMK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="seal">S</span>
                <h1>SIPMK</h1>
            </div>
            <p class="sidebar-role" id="sidebarRole">Portal</p>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-foot">
                <a href="#" id="logoutLink"><span class="icon">🚪</span> Logout</a>
            </div>
        </aside>
        <div class="sidebar-backdrop"></div>

        <main class="app-main">
            <div class="mobile-topbar">
                <button id="sidebarOpen" type="button">☰</button>
                <h2>Riwayat Nilai</h2>
            </div>

            <div class="topbar">
                <div>
                    <h2>Riwayat Nilai</h2>
                    <p>Rekap seluruh nilai yang tercatat pada sistem.</p>
                </div>
                <div class="topbar-user">
                    <div class="avatar" id="topbarAvatar">?</div>
                    <span id="topbarRoleLabel">-</span>
                </div>
            </div>

            <div class="app-content">
                <div class="panel" style="margin-top:0;">
                    <h3>Filter Riwayat</h3>

                    <form id="form-cari-riwayat">
                        <div class="field-grid">
                            <div class="field">
                                <label for="nimRiwayat">NIM</label>
                                <input type="text" id="nimRiwayat" placeholder="Kosongkan untuk lihat semua">
                            </div>
                            <div class="field">
                                <label for="namaRiwayat">Nama</label>
                                <input type="text" id="namaRiwayat" placeholder="Kosongkan untuk lihat semua">
                            </div>
                        </div>
                        <!-- <div class="panel-actions">
                            <button type="submit" class="btn-save">🔍 Lihat Riwayat</button>
                        </div> -->
                        <div class="form-group"
                            style="margin-bottom: 0; display: flex; gap: 10px; align-items: flex-end;">
                            <button type="submit" class="btn-save">🔍 Lihat Riwayat</button>
                        </div>
                    </form>
                </div>

                <div class="panel">
                    <div class="table-toolbar">
                        <h3>Riwayat Nilai</h3>
                        <span class="pill-count" id="jumlahRiwayat">0 data</span>
                    </div>
                    <div style="display:flex; justify-content:flex-end; margin-bottom:14px;">
                        <button type="button" class="btn-secondary" onclick="exportRiwayatCSV()">⬇ Export CSV</button>
                    </div>
                    <div class="table-wrapper">
                        <table class="styled-table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>NIM</th>
                                    <th>Nama</th>
                                    <th>Mata Kuliah</th>
                                    <th>Nilai Akhir</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyRiwayat"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/riwayat.js"></script>
</body>

</html>
