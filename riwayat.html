<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Nilai</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#2563eb;
    color:white;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Riwayat Nilai Mahasiswa</h2>

<input
type="text"
id="nimRiwayat"
placeholder="Masukkan NIM">

<input
type="text"
id="namaRiwayat"
placeholder="Masukkan Nama">

<button onclick="cariRiwayat()">
Lihat Riwayat
</button>

<table>

<thead>

<tr>
<th>No</th>
<th>NIM</th>
<th>Nama</th>
<th>Mata Kuliah</th>
<th>Nilai Akhir</th>
<th>Grade</th>
</tr>

</thead>

<tbody id="tbodyRiwayat">

</tbody>

</table>

</div>

</div>

</body>
</html>
